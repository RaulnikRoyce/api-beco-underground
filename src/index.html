<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        const tokenAutorizacao = localStorage.getItem('token_beco');
        if (!tokenAutorizacao) {
            window.location.replace('login.html');
        }

        function sairDoSistema() {
            localStorage.removeItem('token_beco');
            window.location.replace('login.html');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Beco Underground</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        .card { background-color: #333; padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        h1 { color: #ff4d4d; }
        .custo { font-size: 24px; font-weight: bold; color: #4CAF50; }
        ul { list-style-type: none; padding: 0; }
        li { background: #444; margin: 10px 0; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div style="text-align: right; margin-bottom: 20px; max-width: 500px; margin: 0 auto;">
        <button onclick="sairDoSistema()" style="background-color: #333; color: #fff; border: 1px solid #ff4d4d; padding: 5px 15px; border-radius: 4px; cursor: pointer;">
            Sair do Sistema (Logout)
        </button>
    </div>

    <div class="card">
        <h1>Dashboard: <span id="nome-evento-display">Carregando...</span>
        <select id="select-dashboard" onchange="carregarDashboard()" style="background: #222; color: #ff4d4d; border: none; font-size: 20px; vertical-align: middle;">
            <option value="">Carregando eventos...</option>
        </select>
    </h1>
        <p>Total de Atrações: <span id="total-bandas">...</span></p>
        <p>Custo com Cachês: <span class="custo" id="custo-total">R$ 0,00</span></p>
        
        <h3>Line-up</h3>
        <ul id="lista-bandas">
            <li>Selecione um evento acima...</li>
        </ul>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2 style="color: #ff4d4d;">Cadastrar Nova Banda</h2>
        <form id="form-banda">
            <input type="text" id="nome-banda" placeholder="Nome da Banda (ex: Krisiun)" required style="width: 90%; padding: 8px; margin-bottom: 10px;"><br>
            <input type="text" id="genero-banda" placeholder="Gênero Musical" style="width: 90%; padding: 8px; margin-bottom: 10px;"><br>
            <input type="email" id="contato-banda" placeholder="E-mail de Contato" style="width: 90%; padding: 8px; margin-bottom: 10px;"><br>
            <input type="number" id="cache-banda" placeholder="Cachê Base (R$)" step="0.01" required style="width: 90%; padding: 8px; margin-bottom: 10px;"><br>
            
            <button type="submit" style="background-color: #ff4d4d; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer;">
                Salvar no Banco de Dados
            </button>
        </form>
        <p id="mensagem-form" style="color: #4CAF50; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <script>
        const API_URL = 'https://api-beco-underground.onrender.com';

        // 1. Carrega os eventos no Select
        async function popularSelectEventos() {
            try {
                const res = await fetch(`${API_URL}/eventos`);
                const eventos = await res.json();
                const select = document.getElementById('select-dashboard');
                
                select.innerHTML = ''; 
                
                if (eventos.length === 0) {
                    select.innerHTML = '<option value="">Nenhum evento cadastrado</option>';
                    return;
                }

                eventos.forEach(ev => {
                    select.innerHTML += `<option value="${ev.id}">${ev.nome}</option>`;
                });

                // Força a seleção do primeiro evento e dispara o carregamento
                select.selectedIndex = 0;
                carregarDashboard(); 
            } catch (erro) {
                console.error("Erro ao popular eventos:", erro);
                document.getElementById('select-dashboard').innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        // 2. Carrega o Dashboard dinamicamente
        async function carregarDashboard() {
            const idEvento = document.getElementById('select-dashboard').value;
            if(!idEvento) return;

            // Feedback visual de carregamento
            document.getElementById('nome-evento-display').innerText = "Carregando...";
            const lista = document.getElementById('lista-bandas');
            lista.innerHTML = '<li>Carregando...</li>';

            try {
                // 1. Busca os detalhes do evento
                const resEvento = await fetch(`${API_URL}/eventos/${idEvento}`);
                const dadosEvento = await resEvento.json();
                
                // Atualiza o título
                document.getElementById('nome-evento-display').innerText = dadosEvento.nome;

                // 2. Busca os dados do Dashboard
                const resposta = await fetch(`${API_URL}/dashboard/${idEvento}`);
                const dados = await resposta.json();

                document.getElementById('total-bandas').innerText = dados.total_bandas;
                document.getElementById('custo-total').innerText = `R$ ${dados.custo_total_caches.toFixed(2)}`;

                lista.innerHTML = ''; 
                
                if (dados.atracoes.length === 0) {
                    lista.innerHTML = '<li>Nenhuma banda vinculada.</li>';
                } else {
                    dados.atracoes.forEach(atracao => {
                        const li = document.createElement('li');
                        li.innerText = `${atracao.horario} - ${atracao.banda} (Cachê: R$ ${atracao.custo_banda})`;
                        lista.appendChild(li);
                    });
                }
            } catch (erro) {
                console.error("Erro no Dashboard:", erro);
                document.getElementById('lista-bandas').innerHTML = "<li>Erro ao buscar dados.</li>";
            }
        }

        // 3. Lógica do Formulário de Cadastro (mantida igual)
        document.getElementById('form-banda').addEventListener('submit', async function(evento) {
            evento.preventDefault();
            const novaBanda = {
                nome: document.getElementById('nome-banda').value,
                genero: document.getElementById('genero-banda').value,
                contato: document.getElementById('contato-banda').value,
                cache_base: parseFloat(document.getElementById('cache-banda').value)
            };

            try {
                const token = localStorage.getItem('token_beco');
                const resposta = await fetch(`${API_URL}/bandas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(novaBanda)
                });

                if (resposta.ok) {
                    document.getElementById('mensagem-form').innerText = "Banda cadastrada!";
                    document.getElementById('form-banda').reset();
                } else {
                    document.getElementById('mensagem-form').innerText = "Erro ao cadastrar.";
                }
            } catch (erro) {
                document.getElementById('mensagem-form').innerText = "Erro de conexão.";
            }
        });

        // Inicializa a página
        popularSelectEventos();
    </script>
</body>
</html>
