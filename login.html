<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Produtor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #222; padding: 30px; border-radius: 8px; width: 300px; text-align: center; border: 1px solid #ff4d4d; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { background-color: #ff4d4d; color: white; padding: 10px; width: 100%; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #cc0000; }
        #mensagem { color: #ff4d4d; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso Restrito</h2>
        <form id="form-login">
            <input type="email" id="email" placeholder="E-mail do Produtor" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
        <p id="mensagem"></p>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const mensagem = document.getElementById('mensagem');

            try {
                // Batendo na sua API de produção
                const resposta = await fetch('https://api-beco-underground.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    mensagem.style.color = "#4CAF50";
                    mensagem.innerText = "Acesso liberado! Entrando...";
                    
                    // Salva o "crachá" (Token JWT) no navegador
                    localStorage.setItem('token_beco', dados.token);
                    
                    // Redireciona para o painel principal em 1 segundo
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    mensagem.style.color = "#ff4d4d";
                    mensagem.innerText = dados.erro || "E-mail ou senha incorretos.";
                }
            } catch (erro) {
                mensagem.innerText = "Erro ao conectar com o servidor.";
            }
        });
    </script>
</body>
</html>
